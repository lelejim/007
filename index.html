<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF手写笔记 | 缩放+移动批注+翻页+导出PDF</title>
    <!-- 三方依赖 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #f5f5f5;
            overflow: hidden;
            height: 100vh;
        }
        /* 顶部工具栏 */
        .toolbar {
            display: flex;
            gap: 6px;
            padding: 10px;
            background: #fff;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
            align-items: center;
        }
        button, input {
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #eee;
        }
        button.active {
            background: #007bff;
            color: white;
        }
        .container {
            display: flex;
            height: calc(100vh - 56px);
        }
        .sidebar {
            width: 150px;
            background: #fafafa;
            border-right: 1px solid #eee;
            overflow-y: auto;
            padding: 10px;
        }
        .thumb {
            margin-bottom: 8px;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .thumb.active {
            border-color: #007bff;
        }
        .canvas-area {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        canvas {
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button id="uploadBtn">📂 上传PDF</button>
        <input type="file" id="fileInput" accept=".pdf" style="display: none;">

        <button id="penBtn" class="active">✏️ 画笔</button>
        <button id="highlighterBtn">💡 荧光笔</button>
        <button id="eraserBtn">🧽 橡皮</button>
        <button id="textBtn">📝 文字</button>
        <button id="moveBtn">👆 移动</button>

        <input type="color" id="colorPicker" value="#ff0000">
        <input type="range" id="brushSize" min="1" max="30" value="5">

        <button id="zoomIn">🔍+</button>
        <button id="zoomOut">🔍-</button>
        <button id="zoomReset">🔄 重置</button>

        <button id="prevBtn">⬅️ 上一页</button>
        <span id="pageInfo">第 0 / 0 页</span>
        <button id="nextBtn">➡️ 下一页</button>

        <button id="exportBtn">💾 导出图片</button>
    </div>

    <div class="container">
        <div class="sidebar" id="sidebar"></div>
        <div class="canvas-area">
            <canvas id="pdfCanvas"></canvas>
        </div>
    </div>

    <div id="message">加载中...</div>

    <script>
        // 初始化变量
        let pdfDoc = null;
        let pageNum = 1;
        let pageCount = 0;
        let scale = 1.5;
        let fabricCanvas = null;
        let currentTool = 'pen';
        let currentColor = '#ff0000';
        let brushSize = 5;
        let annotations = {};

        // DOM元素
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const penBtn = document.getElementById('penBtn');
        const highlighterBtn = document.getElementById('highlighterBtn');
        const eraserBtn = document.getElementById('eraserBtn');
        const textBtn = document.getElementById('textBtn');
        const moveBtn = document.getElementById('moveBtn');
        const colorPicker = document.getElementById('colorPicker');
        const brushSizeInput = document.getElementById('brushSize');
        const zoomInBtn = document.getElementById('zoomIn');
        const zoomOutBtn = document.getElementById('zoomOut');
        const zoomResetBtn = document.getElementById('zoomReset');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageInfo = document.getElementById('pageInfo');
        const exportBtn = document.getElementById('exportBtn');
        const messageDiv = document.getElementById('message');
        const sidebar = document.getElementById('sidebar');

        // PDF.js 工作线程
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // 事件监听
        uploadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFileUpload);
        penBtn.addEventListener('click', () => setTool('pen'));
        highlighterBtn.addEventListener('click', () => setTool('highlighter'));
        eraserBtn.addEventListener('click', () => setTool('eraser'));
        textBtn.addEventListener('click', () => setTool('text'));
        moveBtn.addEventListener('click', () => setTool('move'));
        colorPicker.addEventListener('input', (e) => {
            currentColor = e.target.value;
            updateBrushSettings();
        });
        brushSizeInput.addEventListener('input', (e) => {
            brushSize = parseInt(e.target.value);
            updateBrushSettings();
        });
        zoomInBtn.addEventListener('click', () => adjustZoom(0.2));
        zoomOutBtn.addEventListener('click', () => adjustZoom(-0.2));
        zoomResetBtn.addEventListener('click', () => { scale = 1.5; renderPage(pageNum); });
        prevBtn.addEventListener('click', () => changePage(-1));
        nextBtn.addEventListener('click', () => changePage(1));
        exportBtn.addEventListener('click', exportImage);

        // 设置工具
        function setTool(tool) {
            currentTool = tool;
            [penBtn, highlighterBtn, eraserBtn, textBtn, moveBtn].forEach(btn => btn.classList.remove('active'));
            switch(tool) {
                case 'pen': penBtn.classList.add('active'); break;
                case 'highlighter': highlighterBtn.classList.add('active'); break;
                case 'eraser': eraserBtn.classList.add('active'); break;
                case 'text': textBtn.classList.add('active'); break;
                case 'move': moveBtn.classList.add('active'); break;
            }
            updateBrushSettings();
        }

        // 更新画笔设置
        function updateBrushSettings() {
            if (!fabricCanvas) return;
            fabricCanvas.isDrawingMode = currentTool === 'pen' || currentTool === 'highlighter';
            if (currentTool === 'pen') {
                fabricCanvas.freeDrawingBrush.color = currentColor;
                fabricCanvas.freeDrawingBrush.width = brushSize;
                fabricCanvas.freeDrawingBrush.opacity = 1;
            } else if (currentTool === 'highlighter') {
                fabricCanvas.freeDrawingBrush.color = currentColor;
                fabricCanvas.freeDrawingBrush.width = brushSize * 3;
                fabricCanvas.freeDrawingBrush.opacity = 0.3;
            } else if (currentTool === 'eraser') {
                fabricCanvas.freeDrawingBrush.color = '#ffffff';
                fabricCanvas.freeDrawingBrush.width = brushSize * 2;
            }
            fabricCanvas.selection = currentTool === 'move' || currentTool === 'text';
            fabricCanvas.hoverCursor = currentTool === 'move' ? 'move' : 'crosshair';
        }

        // 处理文件上传
        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file || file.type !== 'application/pdf') return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                messageDiv.style.display = 'block';
                messageDiv.textContent = '加载PDF...';
                pdfjsLib.getDocument(arrayBuffer).promise.then(function(pdf) {
                    pdfDoc = pdf;
                    pageCount = pdf.numPages;
                    annotations = {};
                    sidebar.innerHTML = '';
                    for (let i = 1; i <= pageCount; i++) {
                        createThumbnail(i);
                    }
                    pageNum = 1;
                    renderPage(pageNum);
                    messageDiv.style.display = 'none';
                }).catch(function(error) {
                    messageDiv.textContent = '加载失败: ' + error.message;
                    messageDiv.style.display = 'block';
                });
            };
            reader.readAsArrayBuffer(file);
        }

        // 创建缩略图
        function createThumbnail(pageNumber) {
            pdfDoc.getPage(pageNumber).then(function(page) {
                const viewport = page.getViewport({ scale: 0.2 });
                const canvas = document.createElement('canvas');
                canvas.className = 'thumb';
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                canvas.dataset.page = pageNumber;
                canvas.addEventListener('click', () => {
                    pageNum = pageNumber;
                    renderPage(pageNum);
                    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
                    canvas.classList.add('active');
                });
                const ctx = canvas.getContext('2d');
                page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
                    sidebar.appendChild(canvas);
                    if (pageNumber === 1) canvas.classList.add('active');
                });
            });
        }

        // 渲染当前页
        function renderPage(pageNumber) {
            if (!pdfDoc) return;
            pdfDoc.getPage(pageNumber).then(function(page) {
                const viewport = page.getViewport({ scale: scale });
                const canvasEl = document.getElementById('pdfCanvas');
                canvasEl.width = viewport.width;
                canvasEl.height = viewport.height;
                const ctx = canvasEl.getContext('2d');
                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };
                page.render(renderContext).promise.then(function() {
                    if (fabricCanvas) {
                        if (annotations[pageNum]) {
                            annotations[pageNum] = fabricCanvas.toJSON();
                        }
                        fabricCanvas.dispose();
                    }
                    fabricCanvas = new fabric.Canvas('pdfCanvas', {
                        isDrawingMode: true,
                        selection: true
                    });
                    fabricCanvas.setWidth(viewport.width);
                    fabricCanvas.setHeight(viewport.height);
                    if (annotations[pageNumber]) {
                        fabricCanvas.loadFromJSON(annotations[pageNumber], function() {
                            fabricCanvas.renderAll();
                        });
                    }
                    updateBrushSettings();
                    pageInfo.textContent = `第 ${pageNumber} / ${pageCount} 页`;
                    document.querySelectorAll('.thumb').forEach(t => {
                        t.classList.toggle('active', parseInt(t.dataset.page) === pageNumber);
                    });
                });
            });
        }

        // 翻页
        function changePage(delta) {
            const newPage = pageNum + delta;
            if (newPage >= 1 && newPage <= pageCount) {
                if (fabricCanvas) {
                    annotations[pageNum] = fabricCanvas.toJSON();
                }
                pageNum = newPage;
                renderPage(pageNum);
            }
        }

        // 缩放
        function adjustZoom(delta) {
            scale = Math.max(0.5, Math.min(3, scale + delta));
            renderPage(pageNum);
        }

        // 导出图片
        function exportImage() {
            if (!pdfDoc) {
                alert('请先上传PDF');
                return;
            }
            if (fabricCanvas) {
                annotations[pageNum] = fabricCanvas.toJSON();
            }
            const link = document.createElement('a');
            link.download = `批注页-${pageNum}.png`;
            link.href = fabricCanvas.toDataURL('image/png');
            link.click();
            alert('已导出当前页为图片！');
        }
    </script>
</body>
</html>
