<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Note Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background-color: #e9ecef;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .toolbar-wrap {
            background: #fff;
            border-bottom: 1px solid #ddd;
        }
        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            flex-wrap: wrap;
        }
        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #eee;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .audio-top {
            padding: 8px 16px 12px;
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .audio-top p {
            font-size: 13px;
            color: #444;
        }
        audio {
            width: 300px;
            border-radius: 4px;
        }

        button {
            padding: 6px 10px;
            border: none;
            border-radius: 5px;
            background: #f1f3f5;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        button.active {
            background: #228be6;
            color: #fff;
        }
        button:hover:not(.active) {
            background: #dee2e6;
        }
        input[type="color"] {
            width: 28px;
            height: 28px;
            border: none;
            cursor: pointer;
        }
        input[type="range"] {
            width: 80px;
        }
        .divider {
            width: 1px;
            height: 24px;
            background: #ddd;
            margin: 0 4px;
        }

        .main-box {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .canvas-container {
            width: 75%;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        .a4-paper {
            width: 750px;
            height: 1060px;
            background: #fff;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            position: relative;
        }
        #pdfCanvas {
            width: 100%;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
        }

        .right-panel {
            width: 25%;
            background: #fff;
            border-left: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }
        .panel-title {
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 1px solid #eee;
        }
        .thumb-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .page-thumb {
            width: 100%;
            aspect-ratio: 1 / 1.414;
            border: 2px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            background: #f8f8f8;
            transform: scale(1.05);
        }
        .page-thumb.active {
            border-color: #228be6;
        }
        .page-thumb canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .page-info {
            padding: 12px;
            border-top: 1px solid #eee;
            text-align: center;
            font-size: 14px;
            color: #333;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 12px 24px;
            border-radius: 6px;
            display: none;
            z-index: 999;
        }
        #fileInput, #audioInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="toolbar-wrap">
        <div class="toolbar">
            <button id="uploadBtn">📂</button>
            <input type="file" id="fileInput" accept=".pdf">
            <div class="divider"></div>

            <button id="penBtn" class="active">✏️</button>
            <div class="ctrl-group">
                <input type="color" id="penColor" value="#ff0000">
                <input type="range" id="penSize" min="1" max="40" value="5">
            </div>
            <div class="divider"></div>

            <button id="highBtn">💡</button>
            <div class="ctrl-group">
                <input type="color" id="highColor" value="#ffff00">
                <input type="range" id="highAlpha" min="0" max="100" value="30">
            </div>
            <div class="divider"></div>

            <button id="eraserBtn">🧽</button>
            <button id="textBtn">📝</button>
            <button id="moveBtn">👆</button>
            <div class="divider"></div>

            <button id="zoomIn">🔍+</button>
            <button id="zoomOut">🔍-</button>
            <button id="zoomReset">↺</button>
            <div class="divider"></div>

            <button id="prevPage">⬅</button>
            <button id="nextPage">➡</button>
            <div class="divider"></div>

            <button id="exportBtn">💾</button
