<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PDF手写笔记 | 缩放+移动批注+翻页+导出PDF</title>
    <!-- 三方依赖 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #f5f5f5; overflow: hidden; height: 100vh; }

        /* 顶部工具栏 */
        .toolbar {
            display: flex;
            gap: 6px;
            padding: 10px;
            background: #fff;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
            align-items: center;
        }
        button, input {
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }
        .tool-btn { background: #e9edf2; }
        .tool-btn.active { background: #2563eb; color: #fff; }
        .color-picker { width: 36px; height: 30px; padding: 0; border: none; }
        .width-input { width: 50px; }
        .page-info { margin: 0 8px; font-size: 13px; color: #666; }

        /* 主容器 + 滚动 + 缩放 */
        .wrapper {
            width: 100%;
            height: calc(100vh - 62px);
            overflow: auto;
            background: #e8e8e8;
        }
        .container {
            position: relative;
            transform-origin: 0 0;
        }
        #pdfView { position: relative; }
        #drawCanvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 隐藏文件选择 */
        input[type="file"] { display: none; }

        /* 文字弹窗 */
        .text-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 16px;
            border-radius: 6px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            z-index: 999;
            display: none;
        }
        .text-modal textarea {
            width: 220px;
            height: 80px;
            padding: 6px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            resize: none;
        }
        .mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 998;
            display: none;
        }
    </style>
</head>
<body>
    <!-- 工具栏 -->
    <div class="toolbar">
        <button class="tool-btn" id="uploadPdf">📂 上传PDF</button>
        <input type="file" id="pdfFile" accept=".pdf">

        <button class="tool-btn" id="prevPage">⬅ 上一页</button>
        <span class="page-info" id="pageText">0 / 0</span>
        <button class="tool-btn" id="nextPage">下一页 ➡</button>

        <button class="tool-btn active" id="penTool">✏️ 画笔</button>
        <button class="tool-btn" id="highlighter">💡 荧光笔</button>
        <button class="tool-btn" id="eraser">🧽 橡皮</button>
        <button class="tool-btn" id="textTool">📝 文字</button>
        <button class="tool-btn" id="selectTool">👆 选择/移动</button>

        <input type="color" class="color-picker" id="colorPicker" value="#ff0000">
        <input type="number" class="width-input" id="lineWidth" value="4" min="1" max="30">

        <button class="tool-btn" id="zoomOut">🔍- 缩小</button>
        <button class="tool-btn" id="zoomReset">🔄 重置缩放</button>
        <button class="tool-btn" id="zoomIn">🔍+ 放大</button>

        <button class="tool-btn" id="undo">↩ 撤销</button>
        <button class="tool-btn" id="clear">🗑 清空</button>
        <button class="tool-btn" id="savePdf">💾 导出PDF</button>
    </div>

    <!-- 画布外层（支持缩放） -->
    <div class="wrapper" id="wrapper">
        <div class="container" id="container">
            <div id="pdfView"></div>
            <canvas id="drawCanvas"></canvas>
        </div>
    </div>

    <!-- 文字批注弹窗 -->
    <div class="mask" id="mask"></div>
    <div class="text-modal" id="textModal">
        <textarea id="textInput" placeholder="输入批注文字..."></textarea>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
            <button class="tool-btn" id="cancelText">取消</button>
            <button class="tool-btn active" id="confirmText">确定</button>
        </div>
    </div>

    <script>
        // 三方库初始化
        const { jsPDF } = window.jspdf;
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // ========== 全局变量 ==========
        let pdfDoc = null, pageNum = 1, totalPage = 0;
        let pageHistory = {};
        let pageTextList = {};
        let currentTool = 'pen';
        let lineColor = '#ff0000';
        let lineWidth = 4;
        let textPoint = null;

        // 缩放相关
        let scale = 1;
        const scaleStep = 0.1;
        const minScale = 0.5;
        const maxScale = 2.5;

        // 选择/移动批注相关
        let isSelecting = false;
        let isDragging = false;
        let dragStartX = 0, dragStartY = 0;
        let dragOffsetX = 0, dragOffsetY = 0;

        const wrapper = document.getElementById('wrapper');
        const container = document.getElementById('container');
        const pdfView = document.getElementById('pdfView');
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        const pageText = document.getElementById('pageText');

        let isDrawing = false;

        // ========== 工具切换 ==========
        const penBtn = document.getElementById('penTool');
        const highlighterBtn = document.getElementById('highlighter');
        const eraserBtn = document.getElementById('eraser');
        const textBtn = document.getElementById('textTool');
        const selectBtn = document.getElementById('selectTool');
        const colorPicker = document.getElementById('colorPicker');
        const widthInput = document.getElementById('lineWidth');

        function resetTool() {
            [penBtn, highlighterBtn, eraserBtn, textBtn, selectBtn].forEach(btn => btn.classList.remove('active'));
        }
        penBtn.onclick = () => { resetTool(); penBtn.classList.add('active'); currentTool = 'pen'; ctx.globalAlpha = 1; };
        highlighterBtn.onclick = () => { resetTool(); highlighterBtn.classList.add('active'); currentTool = 'highlighter'; ctx.globalAlpha = 0.4; };
        eraserBtn.onclick = () => { resetTool(); eraserBtn.classList.add('active'); currentTool = 'eraser'; };
        textBtn.onclick = () => { resetTool(); textBtn.classList.add('active'); currentTool = 'text'; };
        selectBtn.onclick = () => { resetTool(); selectBtn.classList.add('active'); currentTool = 'select'; };

        colorPicker.oninput = e => lineColor = e.target.value;
        widthInput.oninput = e => lineWidth = Number(e.target.value);

        // ========== 缩放功能 ==========
        function applyScale() {
            container.style.transform = `scale(${scale})`;
        }
        document.getElementById('zoomIn').onclick = () => {
            if (scale < maxScale) {
                scale += scaleStep;
                applyScale();
            }
        };
        document.getElementById('zoomOut').onclick = () => {
            if (scale > minScale) {
                scale -= scaleStep;
                applyScale();
            }
        };
        document.getElementById('zoomReset').onclick = () => {
            scale = 1;
            applyScale();
            wrapper.scrollTop = 0;
            wrapper.scrollLeft = 0;
        };

        // 鼠标滚轮缩放（可选）
        wrapper.addEventListener('wheel', e => {
            if (e.ctrlKey) {
                e.preventDefault();
                if (e.deltaY < 0 && scale < maxScale) scale += scaleStep;
                else if (e.deltaY > 0 && scale > minScale) scale -= scaleStep;
                applyScale();
            }
        });

        // ========== PDF 上传 & 渲染 ==========
        const uploadBtn = document.getElementById('uploadPdf');
        const pdfFile = document.getElementById('pdfFile');
        uploadBtn.onclick = () => pdfFile.click();

        pdfFile.onchange = async e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async ev => {
                const buf = new Uint8Array(ev.target.result);
                pdfDoc = await pdfjsLib.getDocument(buf).promise;
                totalPage = pdfDoc.numPages;
                pageNum = 1;
                pageHistory = {};
                pageTextList = {};
                updatePageText();
                renderPage(pageNum);
            };
            reader.readAsArrayBuffer(file);
        };

        async function renderPage(num) {
            if (!pdfDoc) return;
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale: 1.2 });

            const pdfCanvas = document.createElement('canvas');
            const pdfCtx = pdfCanvas.getContext('2d');
            pdfCanvas.width = viewport.width;
            pdfCanvas.height = viewport.height;
            pdfView.innerHTML = '';
            pdfView.appendChild(pdfCanvas);

            canvas.width = viewport.width;
            canvas.height = viewport.height;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            await page.render({ canvasContext: pdfCtx, viewport }).promise;

            if (pageHistory[num]) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = pageHistory[num];
            }
            if (pageTextList[num]) {
                pageTextList[num].forEach(item => {
                    drawText(item.x, item.y, item.content, item.color);
                });
            }
        }

        function updatePageText() {
            pageText.innerText = `${pageNum} / ${totalPage}`;
        }

        // 翻页
        document.getElementById('prevPage').onclick = () => {
            if (pageNum <= 1) return;
            saveCurrentPageDraw();
            pageNum--;
            updatePageText();
            renderPage(pageNum);
        };
        document.getElementById('nextPage').onclick = () => {
            if (pageNum >= totalPage) return;
            saveCurrentPageDraw();
            pageNum++;
            updatePageText();
            renderPage(pageNum);
        };

        function saveCurrentPageDraw() {
            pageHistory[pageNum] = canvas.toDataURL();
        }

        // ========== 坐标转换（适配缩放） ==========
        function getRealPos(e) {
            const rect = canvas.getBoundingClientRect();
            const t = e.touches ? e.touches[0] : e;
            return {
                x: (t.clientX - rect.left) / scale,
                y: (t.clientY - rect.top) / scale
            };
        }

        // ========== 手写绘制 ==========
        function startDraw(e) {
            e.preventDefault();
            const pos = getRealPos(e);

            if (currentTool === 'text') {
                textPoint = pos;
                document.getElementById('mask').style.display = 'block';
                document.getElementById('textModal').style.display = 'block';
                document.getElementById('textInput').focus();
                return;
            }

            if (currentTool === 'select') {
                isSelecting = true;
                dragStartX = pos.x;
                dragStartY = pos.y;
                return;
            }

            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            const pos = getRealPos(e);

            if (currentTool === 'select' && isSelecting) {
                isDragging = true;
                dragOffsetX = pos.x - dragStartX;
                dragOffsetY = pos.y - dragStartY;
                return;
            }

            if (!isDrawing || currentTool === 'text' || currentTool === 'select') return;
            e.preventDefault();

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (currentTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = lineWidth * 3;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = lineColor;
                ctx.lineWidth = lineWidth;
            }
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function endDraw(e) {
            const pos = getRealPos(e);

            // 选择/移动逻辑
            if (currentTool === 'select' && isSelecting) {
                if (isDragging && (Math.abs(dragOffsetX) > 2 || Math.abs(dragOffsetY) > 2)) {
                    moveAllAnnotations(dragOffsetX, dragOffsetY);
                }
                isSelecting = false;
                isDragging = false;
                saveCurrentPageDraw();
                return;
            }

            if (!isDrawing) return;
            isDrawing = false;
            saveCurrentPageDraw();
        }

        // 整体平移当前页所有批注（线条+文字）
        function moveAllAnnotations(dx, dy) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');

            tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
            tempCtx.drawImage(canvas, dx, dy);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(tempCanvas, 0, 0);

            // 同步移动文字批注
            if (pageTextList[pageNum]) {
                pageTextList[pageNum].forEach(item => {
                    item.x += dx;
                    item.y += dy;
                });
            }
        }

        // 绑定鼠标+触屏
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseleave', endDraw);
        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', endDraw);

        // ========== 文字批注 ==========
        const mask = document.getElementById('mask');
        const textModal = document.getElementById('textModal');
        const textInput = document.getElementById('textInput');

        function drawText(x, y, content, color) {
            ctx.globalAlpha = 1;
            ctx.fillStyle = color;
            ctx.font = '16px sans-serif';
            ctx.fillText(content, x, y);
        }

        document.getElementById('cancelText').onclick = () => {
            mask.style.display = 'none';
            textModal.style.display = 'none';
            textInput.value = '';
            textPoint = null;
        };

        document.getElementById('confirmText').onclick = () => {
            const txt = textInput.value.trim();
            if (!txt || !textPoint) {
                mask.style.display = 'none';
                textModal.style.display = 'none';
                return;
            }
            if (!pageTextList[pageNum]) pageTextList[pageNum] = [];
            pageTextList[pageNum].push({
                x: textPoint.x,
                y: textPoint.y,
                content: txt,
                color: lineColor
            });
            drawText(textPoint.x, textPoint.y, txt, lineColor);
            saveCurrentPageDraw();

            mask.style.display = 'none';
            textModal.style.display = 'none';
            textInput.value = '';
            textPoint = null;
        };

        // ========== 撤销 / 清空 ==========
        document.getElementById('undo').onclick = () => {
            renderPage(pageNum);
        };
        document.getElementById('clear').onclick = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pageHistory[pageNum] = '';
            pageTextList[pageNum] = [];
        };

        // ========== 导出完整PDF ==========
        document.getElementById('savePdf').onclick = async () => {
            if (!pdfDoc) return alert('请先上传PDF文件');
            const doc = new jsPDF({
                orientation: 'p',
                unit: 'px',
                format: [canvas.width, canvas.height]
            });

            for (let i = 1; i <= totalPage; i++) {
                saveCurrentPageDraw();
                await renderPage(i);
                await new Promise(resolve => setTimeout(resolve, 300));
                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                if (i > 1) doc.addPage();
                doc.addImage(imgData, 'JPEG', 0, 0, canvas.width, canvas.height);
            }
            doc.save('带批注笔记.pdf');
        };
    </script>
</body>
</html>
